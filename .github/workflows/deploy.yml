name: Build and Deploy App

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      FRONTEND_IMAGE: oparag/taskapp-frontend
      BACKEND_IMAGE: oparag/taskapp-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/taskapp_frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./app/taskapp_backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.TAG }} -n taskapp
          kubectl rollout status deployment/frontend -n taskapp

      - name: Update backend image
        run: |
          kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.TAG }} -n taskapp
          kubectl rollout status deployment/backend -n taskapp