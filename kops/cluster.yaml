apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: cluster.oparatechstack.com
spec:
  api:
    loadBalancer:
      class: Network
      type: Public
  authorization:
    rbac: {}
  channel: stable
  cloudProvider: aws
  configBase: s3://opara-kops-state/cluster.oparatechstack.com
  etcdClusters:
  - cpuRequest: 200m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: main
  - cpuRequest: 100m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: events
  iam:
    allowContainerRegistry: true
    legacy: false
  kubelet:
    anonymousAuth: false
  kubernetesApiAccess:
  - 0.0.0.0/0
  - ::/0
  kubernetesVersion: 1.34.6
  networkCIDR: 10.0.0.0/16
  networkID: vpc-06abc217c642040aa
  networking:
    calico: {}
  nonMasqueradeCIDR: 100.64.0.0/10
  sshAccess:
  - 0.0.0.0/0
  - ::/0
  subnets:
  - cidr: 10.0.11.0/24
    id: subnet-008cbf2237368bb30
    name: eu-west-3a
    type: Private
    zone: eu-west-3a
  - cidr: 10.0.12.0/24
    id: subnet-06e2e9bae85af4f5a
    name: eu-west-3b
    type: Private
    zone: eu-west-3b
  - cidr: 10.0.13.0/24
    id: subnet-0f68f545a6333c8bd
    name: eu-west-3c
    type: Private
    zone: eu-west-3c
  - cidr: 10.0.1.0/24
    id: subnet-053826f5e98457c4d
    name: utility-eu-west-3a
    type: Utility
    zone: eu-west-3a
  - cidr: 10.0.2.0/24
    id: subnet-06fb5c198211469c0
    name: utility-eu-west-3b
    type: Utility
    zone: eu-west-3b
  - cidr: 10.0.3.0/24
    id: subnet-096d791a233e8132b
    name: utility-eu-west-3c
    type: Utility
    zone: eu-west-3c
  topology:
    dns:
      type: None

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: cluster.oparatechstack.com
  name: control-plane-eu-west-3a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20260218
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
  - eu-west-3a

