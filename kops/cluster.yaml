apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: cluster.oparatechstack.com
spec:
  api:
    loadBalancer:
      class: Network
      type: Public
  authorization:
    rbac: {}
  channel: stable
  cloudProvider: aws
  configBase: s3://opara-kops-state/cluster.oparatechstack.com
  dnsZone: oparatechstack.com
  etcdClusters:
  - cpuRequest: 200m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: main
  - cpuRequest: 100m
    etcdMembers:
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3a
      name: a
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3b
      name: b
    - encryptedVolume: true
      instanceGroup: control-plane-eu-west-3c
      name: c
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: events
  iam:
    allowContainerRegistry: true
    legacy: false
  kubelet:
    anonymousAuth: false
  kubernetesApiAccess:
  - 0.0.0.0/0
  - ::/0
  kubernetesVersion: 1.28.11
  masterPublicName: api.cluster.oparatechstack.com
  networkCIDR: 172.20.0.0/16
  networking:
    calico: {}
  nonMasqueradeCIDR: 100.64.0.0/10
  sshAccess:
  - 0.0.0.0/0
  - ::/0
  subnets:
  - cidr: 172.20.64.0/18
    name: eu-west-3a
    type: Private
    zone: eu-west-3a
  - cidr: 172.20.128.0/18
    name: eu-west-3b
    type: Private
    zone: eu-west-3b
  - cidr: 172.20.192.0/18
    name: eu-west-3c
    type: Private
    zone: eu-west-3c
  - cidr: 172.20.0.0/21
    name: utility-eu-west-3a
    type: Utility
    zone: eu-west-3a
  - cidr: 172.20.8.0/21
    name: utility-eu-west-3b
    type: Utility
    zone: eu-west-3b
  - cidr: 172.20.16.0/21
    name: utility-eu-west-3c
    type: Utility
    zone: eu-west-3c
  topology:
    dns:
      type: Public

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: cluster.oparatechstack.com
  name: control-plane-eu-west-3a
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20260218
  machineType: t3.medium
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
  - eu-west-3a

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: cluster.oparatechstack.com
  name: control-plane-eu-west-3b
spec:
  image: 099720109477/ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-20260218
  machineType: t3.medium
  maxSize: 1
