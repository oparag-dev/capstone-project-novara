---
- name: Bootstrap Kubernetes nodes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install common packages
      apt:
        name:
          - curl
          - unzip
          - python3
          - python3-pip
        state: present

    - name: Check hostname
      command: hostname
      register: hostname_output
      changed_when: false

    - name: Show hostname
      debug:
        var: hostname_output.stdout